<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Betterflyuu - Ultimate Transparent SVG + Premium Text</title>
    <style>
        /* FONT PERSIS SEPERTI REQUEST-MU */
        @import url('https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Nanum+Myeongjo:wght@400;700&display=swap');

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body, html {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background-color: transparent; /* MURNI TRANSPARAN TOTAL */
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* --- WADAH UTAMA KESELURUHAN --- */
        .master-container {
            position: relative;
            width: 1000px;
            height: 280px;
            display: flex;
            justify-content: center;
            align-items: center;
            animation: floating 5s ease-in-out infinite;
        }

        /* --- BINGKAI SVG (MURNI GARIS UKIRAN) --- */
        .svg-frame {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1; /* Di belakang teks */
            transition: filter 0.8s ease; /* Transisi glow saat ganti warna */
        }

        /* Animasi Garis Menggambar Sendiri Saat Load */
        .svg-stroke {
            stroke-dasharray: 3000;
            stroke-dashoffset: 3000;
            animation: drawFrame 1.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        /* --- WADAH TEKS DI DALAM BINGKAI --- */
        .text-wrapper {
            position: relative;
            z-index: 10; /* Di depan bingkai */
            width: 100%; height: 100%;
        }

        /* Logika Transisi Teks */
        .text-container {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%) scale(0.9);
            text-align: center;
            opacity: 0;
            visibility: hidden;
            transition: all 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
            filter: blur(10px);
            width: 100%;
        }

        .text-container.active {
            opacity: 1;
            visibility: visible;
            transform: translate(-50%, -50%) scale(1);
            filter: blur(0);
        }

        .text-container.exit {
            opacity: 0;
            transform: translate(-50%, -50%) scale(1.1) translateY(-15px);
            filter: blur(10px);
        }

        /* --- STYLE TYPOGRAPHY PERSIS SEPERTI PASTED SCRIPT --- */
        .main-title {
            font-family: 'Cinzel Decorative', serif;
            font-size: 5.5rem;
            letter-spacing: 5px;
            margin-bottom: 5px;
            
            /* Kunci Gradasi Mengalir */
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gradientFlow 3s linear infinite;
        }

        .sub-title {
            font-family: 'Nanum Myeongjo', serif;
            font-size: 1.2rem;
            color: #e2d9c2;
            letter-spacing: 4px;
            text-transform: uppercase;
            opacity: 0.8;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.8); /* Tambahan shadow tipis biar kebaca di atas gameplay */
        }

        /* --- WARNA GRADASI TIAP ASRAMA --- */
        .gryff {
            background-image: linear-gradient(to right, #c0392b, #f1c40f, #e74c3c, #f1c40f, #c0392b);
            filter: drop-shadow(0 0 15px rgba(231, 76, 60, 0.5));
        }
        .slyth {
            background-image: linear-gradient(to right, #1e824c, #ecf0f1, #2ecc71, #ecf0f1, #1e824c);
            filter: drop-shadow(0 0 15px rgba(46, 204, 113, 0.5));
        }
        .raven {
            background-image: linear-gradient(to right, #2980b9, #ecf0f1, #3498db, #ecf0f1, #2980b9);
            filter: drop-shadow(0 0 15px rgba(52, 152, 219, 0.5));
        }
        .huff {
            background-image: linear-gradient(to right, #e67e22, #ffffff, #f1c40f, #ffffff, #e67e22);
            filter: drop-shadow(0 0 15px rgba(241, 196, 15, 0.5));
        }
        .better {
            background-image: linear-gradient(to right, #b38728, #fcf6ba, #bf953f, #fbf5b7, #b38728);
            filter: drop-shadow(0 0 20px rgba(191, 149, 63, 0.6));
            font-size: 6.5rem; /* Betterflyuu dibikin lebih gede dikit */
        }

        /* --- KEYFRAMES --- */
        @keyframes drawFrame {
            to { stroke-dashoffset: 0; }
        }
        @keyframes gradientFlow {
            0% { background-position: 0% center; }
            100% { background-position: 200% center; }
        }
        @keyframes floating {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
    </style>
</head>
<body>

    <div class="master-container">
        
        <svg class="svg-frame" id="magic-frame" viewBox="0 0 1000 280" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="0%">
                    <stop offset="0%" stop-color="#b38728" />
                    <stop offset="25%" stop-color="#fcf6ba" />
                    <stop offset="50%" stop-color="#bf953f" />
                    <stop offset="75%" stop-color="#fbf5b7" />
                    <stop offset="100%" stop-color="#b38728" />
                </linearGradient>
            </defs>
            
            <g fill="none" stroke="url(#goldGradient)" stroke-width="2.5" class="svg-stroke">
                <rect x="25" y="25" width="950" height="230" rx="4" />
                <rect x="35" y="35" width="930" height="210" rx="2" stroke-width="1" stroke-opacity="0.6"/>
                
                <path d="M 25 75 C 55 75 75 55 75 25" />
                <circle cx="75" cy="75" r="4" fill="url(#goldGradient)" stroke="none"/>
                
                <path d="M 975 75 C 945 75 925 55 925 25" />
                <circle cx="925" cy="75" r="4" fill="url(#goldGradient)" stroke="none"/>
                
                <path d="M 25 205 C 55 205 75 225 75 255" />
                <circle cx="75" cy="205" r="4" fill="url(#goldGradient)" stroke="none"/>
                
                <path d="M 975 205 C 945 205 925 225 925 255" />
                <circle cx="925" cy="205" r="4" fill="url(#goldGradient)" stroke="none"/>
            </g>
        </svg>

        <div class="text-wrapper">
            
            <div class="text-container" id="step1">
                <div class="main-title gryff">GRYFFINDOR</div>
                <div class="sub-title">The House of Courage</div>
            </div>
            
            <div class="text-container" id="step2">
                <div class="main-title slyth">SLYTHERIN</div>
                <div class="sub-title">The House of Ambition</div>
            </div>

            <div class="text-container" id="step3">
                <div class="main-title raven">RAVENCLAW</div>
                <div class="sub-title">The House of Wisdom</div>
            </div>

            <div class="text-container" id="step4">
                <div class="main-title huff">HUFFLEPUFF</div>
                <div class="sub-title">The House of Loyalty</div>
            </div>

            <div class="text-container" id="step5">
                <div class="main-title better">BETTERFLYUU</div>
                <div class="sub-title">Welcome to My Live</div>
            </div>

        </div>

    </div>

    <script>
        const steps = [
            { id: 'step1', duration: 2500, color: 'rgba(231, 76, 60, 0.6)' }, 
            { id: 'step2', duration: 2500, color: 'rgba(46, 204, 113, 0.6)' }, 
            { id: 'step3', duration: 2500, color: 'rgba(52, 152, 219, 0.6)' }, 
            { id: 'step4', duration: 2500, color: 'rgba(241, 196, 15, 0.6)' }, 
            { id: 'step5', duration: 8000, color: 'rgba(191, 149, 63, 0.8)' }  
        ];

        let currentStep = 0;
        const magicFrame = document.getElementById('magic-frame');

        function runMotion() {
            const currentData = steps[currentStep];
            const currentElement = document.getElementById(currentData.id);
            
            // Mengubah glow di luar bingkai SVG menyesuaikan warna asrama!
            magicFrame.style.filter = `drop-shadow(0 0 15px ${currentData.color})`;

            currentElement.classList.remove('exit');
            currentElement.classList.add('active');

            setTimeout(() => {
                currentElement.classList.remove('active');
                currentElement.classList.add('exit');

                currentStep = (currentStep + 1) % steps.length;
                setTimeout(runMotion, 800); 
            }, currentData.duration);
        }

        window.onload = runMotion;
    </script>
</body>
</html>
