<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Betterflyuu Motion Graphic</title>
    <style>
        /* IMPORT FONT MEWAH */
        @import url('https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Montserrat:wght@300;700&display=swap');

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body, html { 
            width: 100vw; 
            height: 100vh; 
            overflow: hidden; 
            background-color: transparent; /* Transparan untuk Overlay */
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .motion-wrapper {
            text-align: center;
            position: relative;
        }

        /* ANIMASI 1: WELCOME TO MY LIVE (Muncul dari Atas) */
        .sub-text {
            font-family: 'Montserrat', sans-serif;
            font-size: 1.1rem;
            color: #ffffff;
            letter-spacing: 8px;
            text-transform: uppercase;
            opacity: 0;
            transform: translateY(-20px);
            animation: slideInDown 1.2s ease-out forwards;
            animation-delay: 0.3s;
            text-shadow: 0 0 15px rgba(255,255,255,0.5);
        }

        /* ANIMASI 2: BETTERFLYUU (Reveal dari Tengah + Kilauan) */
        .main-name {
            font-family: 'Cinzel Decorative', serif;
            font-size: 5.5rem;
            margin-top: 10px;
            position: relative;
            display: inline-block;
            
            /* Warna Emas Gradasi */
            background: linear-gradient(to bottom, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            
            /* Animasi Muncul Membesar */
            transform: scale(0.8);
            opacity: 0;
            filter: blur(10px);
            animation: revealMain 1.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            animation-delay: 0.8s;
        }

        /* ANIMASI 3: KILAUAN CAHAYA (Gleam Effect) */
        .main-name::after {
            content: "Betterflyuu";
            position: absolute;
            top: 0; left: 0; width: 100%;
            background: linear-gradient(110deg, transparent 40%, rgba(255,255,255,0.8) 50%, transparent 60%);
            background-size: 200% 100%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: lightSweep 4s infinite;
            animation-delay: 2.5s;
        }

        /* ANIMASI 4: GARIS BAWAH (Expanding Line) */
        .glow-line {
            width: 0%;
            height: 2px;
            background: linear-gradient(90deg, transparent, #fcf6ba, transparent);
            margin: 10px auto;
            box-shadow: 0 0 20px #bf953f;
            animation: lineExpand 1.5s ease-in-out forwards;
            animation-delay: 1s;
        }

        /* --- SEMUA LOGIKA GERAKAN (KEYFRAMES) --- */

        /* Muncul dari atas */
        @keyframes slideInDown {
            to { opacity: 1; transform: translateY(0); }
        }

        /* Nama membesar & blur hilang */
        @keyframes revealMain {
            to { opacity: 1; transform: scale(1); filter: blur(0); }
        }

        /* Garis memanjang ke samping */
        @keyframes lineExpand {
            to { width: 100%; }
        }

        /* Kilauan cahaya emas lewat */
        @keyframes lightSweep {
            0% { background-position: -200% 0; }
            30% { background-position: 200% 0; }
            100% { background-position: 200% 0; }
        }

        /* Floating Efek (Biar nggak kaku/diam setelah muncul) */
        .motion-wrapper {
            animation: floating 4s ease-in-out infinite;
        }

        @keyframes floating {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
    </style>
</head>
<body>

    <div class="motion-wrapper">
        <div class="sub-text">Welcome to My Live</div>
        <h1 class="main-name">Betterflyuu</h1>
        <div class="glow-line"></div>
    </div>

</body>
</html>
